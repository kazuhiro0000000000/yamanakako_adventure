function resize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  const scale = Math.min(ww / W, wh / H);
  const sw = Math.floor(W * scale), sh = Math.floor(H * scale);
  canvas.style.width  = sw + 'px';
  canvas.style.height = sh + 'px';
  canvas.style.left   = Math.floor((ww - sw) / 2) + 'px';
  canvas.style.top    = Math.floor((wh - sh) / 2) + 'px';
}

function hexToRgb(hex) {
  const n = parseInt(hex.replace('#',''), 16);
  return [(n>>16)&255, (n>>8)&255, n&255];
}
function shiftColor(hex, amt) {
  const [r,g,b] = hexToRgb(hex);
  return `rgb(${clamp(r+amt)},${clamp(g+amt)},${clamp(b+amt)})`;
}
function clamp(v) { return Math.min(255, Math.max(0, v|0)); }

let AC = null;
function initAudio() { if(AC) return; try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} }
function tone(hz, sec, vol, type) {
  if(!AC||hz<=0) return;
  try {
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type||'square'; o.frequency.value=hz;
    const t=AC.currentTime;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+sec);
    o.start(t); o.stop(t+sec+0.01);
  } catch(e){}
}
function noise(sec, vol) {
  if(!AC) return;
  try {
    const n=AC.sampleRate*sec|0, b=AC.createBuffer(1,n,AC.sampleRate), d=b.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
    const s=AC.createBufferSource(), g=AC.createGain();
    s.buffer=b; s.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(vol,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+sec);
    s.start();
  } catch(e){}
}

  clear() { [[523,0],[659,150],[784,300],[1047,450],[784,580],[1047,750]].forEach(([hz,t])=>setTimeout(()=>tone(hz,.14,.2,'sine'),t)); },
  over()  { [[440,0],[349,170],[294,340],[220,530]].forEach(([hz,t])=>setTimeout(()=>tone(hz,.16,.14,'sawtooth'),t)); },
  intro() { [[523,0],[659,130],[784,260]].forEach(([hz,t])=>setTimeout(()=>tone(hz,.12,.17,'sine'),t)); },

let bgmKey=null, bgmIdx=0, bgmTid=null;
function startBGM(key) { if(bgmKey===key) return; stopBGM(); bgmKey=key; bgmIdx=0; _bgmTick(); }
function stopBGM() { bgmKey=null; if(bgmTid) clearTimeout(bgmTid); }
function _bgmTick() {
  const k=bgmKey; if(!k||!AC) return;
  const [hz,ms]=BGM_SEQ[k][bgmIdx%BGM_SEQ[k].length];
  if(hz>0) tone(hz, ms*0.80/1000, 0.07, 'square');
  bgmIdx++; bgmTid=setTimeout(_bgmTick, ms);
}

let keyHeld=false;
document.addEventListener('keydown',e=>{
  if(['Space','ArrowUp','KeyW'].includes(e.code)){
    e.preventDefault(); if(!keyHeld){keyHeld=true;onAction();}
  }
});
document.addEventListener('keyup',e=>{ if(['Space','ArrowUp','KeyW'].includes(e.code)) keyHeld=false; });

function toXY(cx,cy) {
  const r=canvas.getBoundingClientRect();
  return [(cx-r.left)*W/r.width, (cy-r.top)*H/r.height];
}
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0], [mx,my]=toXY(t.clientX,t.clientY);
  if(state===ST.SELECT) handleSelectClick(mx,my); else onAction();
},{passive:false});
canvas.addEventListener('mousedown',e=>{
  const [mx,my]=toXY(e.clientX,e.clientY);
  if(state===ST.SELECT) handleSelectClick(mx,my); else onAction();
});

function getCards() {
  const bw=155,bh=225,total=bw*4+20*3,sx=(W-total)/2;
  return Array.from({length:4},(_,i)=>({bx:sx+i*(bw+20),by:105,bw,bh}));
}
function handleSelectClick(mx,my) {
  initAudio();
  const cards=getCards();
  for(let i=0;i<4;i++){
    const {bx,by,bw,bh}=cards[i];
    if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh){ chIdx=i; startStage(0); return; }
  }
}
function onAction() {
  initAudio();
  if(state===ST.GAME){
    if(P.jumps<2){ const d=P.jumps===1; P.vy=ch.jump; P.jumps++; spawnPtcl(P.x+20,P.y+50,'#FFF',8,2.5); d?SFX.jump2():SFX.jump(); }
  } else if(state===ST.TITLE){ state=ST.SELECT; startBGM('title'); }
  else if(state===ST.INTRO)  { beginGame(); }
  else if(state===ST.CLEAR)  { goNextStage(); }
  else if(state===ST.OVER)   { state=ST.SELECT; startBGM('title'); }
  else if(state===ST.END)    { state=ST.SELECT; startBGM('title'); }
}

// =============================================
// ステージ管理
// =============================================
function startStage(idx){
  stageIdx=idx; ch=CHARS[chIdx];
  score=0; timer=STAGES[idx].time; hp=3; scroll=0; frame=0;
  if(idx===0){ total=0; noDamage=true; }
  P={x:120,y:GROUND-52,vy:0,jumps:0,inv:0,landBounce:0};
  obs=[]; items=[]; ptcls=[]; ftexts=[];
  buildStage(idx);
  state=ST.INTRO; introWait=200;
  startBGM(['shore','water','forest'][idx]);
  SFX.intro();
}
function beginGame(){
  state=ST.GAME;
  if(timerID) clearInterval(timerID);
  timerID=setInterval(()=>{ if(state!==ST.GAME) return; timer--; if(timer<=0){timer=0;finishGame(false);} },1000);
}
function finishGame(clear){
  if(timerID) clearInterval(timerID);
  stopBGM(); total+=score;
  if(clear){ score+=timer*10; total+=timer*10; state=ST.CLEAR; SFX.clear(); }
  else { state=ST.OVER; SFX.over(); }
}
function goNextStage(){ if(stageIdx<2) startStage(stageIdx+1); else { state=ST.END; startBGM('ending'); } }

function buildStage(idx){
  const sg=STAGES[idx];
  for(let x=1100;x<sg.len-350;x+=270+rand(180)){
    const ot=sg.obsTypes[ri(sg.obsTypes.length)];
    obs.push({x,y:GROUND-ot.h,w:ot.w,h:ot.h,type:ot.t,phase:rand(6.28),spd:ot.t==='rollog'?2.5:0});
  }
  for(let x=350;x<sg.len-350;x+=160+rand(120)){
    const it=sg.itmTypes[ri(sg.itmTypes.length)];
    items.push({x,y:GROUND-42-(Math.random()<0.38?90:0),type:it.t,pts:it.pts,bob:rand(6.28),done:false});
  }
  obs.push({x:sg.len,y:GROUND-120,w:60,h:120,type:'goal'});
}

// =============================================
// 更新
// =============================================
function update(){
  if(state===ST.INTRO){ introWait--; if(introWait<=0) beginGame(); return; }
  if(state!==ST.GAME) return;
  frame++;
  const sg=STAGES[stageIdx];
  scroll+=4*ch.speedMul;
  if(sg.len-scroll+W/4<P.x+40){ finishGame(true); return; }

  P.vy+=ch.grav; P.y+=P.vy;
  if(P.y>=GROUND-52){ if(P.vy>2) P.landBounce=8; P.y=GROUND-52; P.vy=0; P.jumps=0; }
  if(P.landBounce>0) P.landBounce*=0.7;
  if(P.inv>0) P.inv--;

  for(const o of obs){
    if(o.type==='goal') continue;
    if(o.type==='jumpfish') o.oy=o.y-Math.max(0,Math.sin(frame*0.06+o.phase)*52);
    else if(o.type==='rollog') o.x-=o.spd;
    else if(o.type==='duck')   o.x-=0.6;
    const ox=o.x-scroll+W/4, oy=o.oy!==undefined?o.oy:o.y;
    if(P.inv===0&&P.x+38>ox+4&&P.x+4<ox+o.w-4&&P.y+52>oy+4&&P.y+8<oy+o.h){
      hp--; P.inv=90; P.vy=-8; noDamage=false;
      spawnPtcl(P.x+20,P.y+26,'#FF4444',14,3.5);
      addTxt(P.x+20,P.y-10,'ドキン！','#FF4444');
      SFX.hit();
      if(hp<=0){ hp=0; finishGame(false); return; }
    }
  }
  for(const it of items){
    if(it.done) continue;
    let ix=it.x-scroll+W/4;
    const iy=it.y+Math.sin(frame*0.05+it.bob)*5;
    if(ch.mag>0){
      const dx=P.x+20-ix,dy=P.y+26-iy;
      if(Math.hypot(dx,dy)<ch.mag){ it.x+=dx*0.06; it.y+=dy*0.06; ix=it.x-scroll+W/4; }
    }
    if(P.x+38>ix&&P.x+4<ix+28&&P.y+52>iy&&P.y+8<iy+28){
      it.done=true; score+=it.pts;
      spawnPtcl(ix+14,iy+14,'#FFD700',12,3);
      addTxt(ix+14,iy-8,'+'+it.pts,'#FFD700');
      SFX.coin();
    }
  }
  ptcls=ptcls.filter(p=>p.life>0);
  for(const p of ptcls){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life--; p.r*=0.93; }
  ftexts=ftexts.filter(t=>t.life>0);
  for(const t of ftexts){ t.y-=0.9; t.life--; }
}

// =============================================
// 描画
// =============================================
function draw(){
  ctx.clearRect(0,0,W,H);
  switch(state){
    case ST.TITLE:  drawTitle();  break;
    case ST.SELECT: drawSelect(); break;
    case ST.INTRO:  drawIntro();  break;
    case ST.GAME:   drawScene(); drawHUD(); drawBar(); break;
    case ST.CLEAR:  drawScene(); drawHUD(); drawBar(); drawClearOverlay(); break;
    case ST.OVER:   drawScene(); drawHUD(); drawBar(); drawOverOverlay();  break;
    case ST.END:    drawEnding(); break;
  }
}

function fitFont(text, maxW, maxSize, weight) {
  weight = weight || 'bold';
  let sz = maxSize;
  ctx.font = `${weight} ${sz}px sans-serif`;
  while (ctx.measureText(text).width > maxW && sz > 10) {
    sz -= 2;
    ctx.font = `${weight} ${sz}px sans-serif`;
  }
}

function drawIntro(){
  const sg=STAGES[stageIdx];
  if(sg.bg==='shore') drawBG_shore(0); else if(sg.bg==='water') drawBG_water(0); else drawBG_forest(0);
  const alpha=Math.min(1,(200-introWait)/30);

    ctx.fillStyle='#AAFFAA';

// ─────────────────────────────────
// ゲームシーン
// ─────────────────────────────────
function drawScene(){
  const bg=STAGES[stageIdx].bg;
  if(bg==='shore') drawBG_shore(scroll); else if(bg==='water') drawBG_water(scroll); else drawBG_forest(scroll);

  for(const o of obs){
    const ox=o.x-scroll+W/4;
    if(ox<-80||ox>W+80) continue;
    const oy=o.oy!==undefined?o.oy:o.y;
    if(o.type==='goal') drawGoal(ox,o.y); else drawObs(o,ox,oy);
  }
  for(const it of items){
    if(it.done) continue;
    const ix=it.x-scroll+W/4;
    if(ix<-50||ix>W+50) continue;
    drawItem(it,ix,it.y+Math.sin(frame*0.05+it.bob)*5);
  }
  for(const p of ptcls){
    ctx.save(); ctx.globalAlpha=p.life/28;
    ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }

  const shadowW = 28 - P.landBounce;
  ctx.save(); ctx.globalAlpha=0.25;
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(P.x+20,GROUND-2,shadowW,5,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  const flash=P.inv>0&&Math.floor(P.inv/5)%2===1;
  if(!flash){
    ctx.save();
    if(P.inv>0){ ctx.shadowColor='#88FFFF'; ctx.shadowBlur=20; }
    if(bg==='water') drawSUPBoard(P.x, P.y+52-P.landBounce);
    drawChar(ch,P.x,P.y-P.landBounce,Math.floor(frame/8)%4,true);
    ctx.restore();
  }

  for(const t of ftexts){
    ctx.save(); ctx.globalAlpha=t.life/50;
    ctx.fillStyle=t.col; ctx.font='bold 20px sans-serif';
    ctx.textAlign='center'; ctx.fillText(t.txt,t.x,t.y); ctx.restore();
  }
}

// ─────────────────────────────────
// エンディング
// ─────────────────────────────────
function drawEnding(){
  const t=Date.now()*0.001;
  const fc=['#FF4444','#FFD700','#44FF88','#4488FF','#FF44FF','#FF8844'];

  if(noDamage){
    // ══════════════════════════════════════════
    // パーフェクトクリア！ 豪華エンディング
    // ══════════════════════════════════════════

    // 背景：虹グラデ
    const bg=ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#0a0050'); bg.addColorStop(0.35,'#300060');
    bg.addColorStop(0.65,'#003040'); bg.addColorStop(1,'#002800');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

    // 星空
    for(let s=0;s<60;s++){
      const sx=(s*173+31)%W, sy=(s*97+11)%(H*0.7);
      const alpha=0.4+0.6*Math.abs(Math.sin(t*1.1+s));
      ctx.globalAlpha=alpha;
      ctx.fillStyle='#FFF';
      ctx.beginPath(); ctx.arc(sx,sy,1+s%2,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;

    // 大花火 × 9個（より大きく豪華に）
    for(let f=0;f<9;f++){
      const fx=(f%3)*W/3+W/6+Math.sin(t*0.3+f)*30;
      const fy=Math.floor(f/3)*H*0.28+60+Math.sin(t*0.5+f*1.3)*20;
      const burst=Math.sin(t*2.2+f)*0.5+0.5;
      const rays=16;
      for(let i=0;i<rays;i++){
        const a=i/rays*Math.PI*2+t*(f%2?1.2:-0.8);
        const r=(30+burst*28)*(0.8+0.2*(i%3===0?1.5:1));
        const col=fc[(f*3+i)%fc.length];
        ctx.save();
        ctx.globalAlpha=0.6+burst*0.4;
        ctx.strokeStyle=col; ctx.lineWidth=2.5;
        ctx.shadowColor=col; ctx.shadowBlur=8;
        ctx.beginPath();
        ctx.moveTo(fx,fy);
        ctx.lineTo(fx+Math.cos(a)*r,fy+Math.sin(a)*r);
        ctx.stroke();
        ctx.beginPath(); ctx.arc(fx+Math.cos(a)*r,fy+Math.sin(a)*r,3,0,Math.PI*2);
        ctx.fillStyle=col; ctx.fill();
        ctx.restore();
      }
    }

    // キラキラ降り注ぐ
    for(let k=0;k<30;k++){
      const kx=(k*137+t*80)%W;
      const ky=(k*97+t*(30+k%4)*2)%H;
      const ks=2+k%3;
      ctx.save();
      ctx.globalAlpha=0.7+0.3*Math.sin(t*3+k);
      ctx.fillStyle=fc[k%fc.length];
      ctx.beginPath();
      for(let p=0;p<4;p++){
        const pa=p/4*Math.PI*2-Math.PI/4+t*2;
        const pr=p%2===0?ks*2.5:ks;
        p===0?ctx.moveTo(kx+Math.cos(pa)*pr,ky+Math.sin(pa)*pr)
             :ctx.lineTo(kx+Math.cos(pa)*pr,ky+Math.sin(pa)*pr);
      }
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }

    // メインパネル（金縁）
    const eg=ctx.createLinearGradient(W/2-290,100,W/2+290,360);
    eg.addColorStop(0,'rgba(20,5,60,0.93)'); eg.addColorStop(1,'rgba(5,30,20,0.93)');
    ctx.fillStyle=eg; rrect(W/2-290,100,580,260,26); ctx.fill();
    // 金のボーダー（二重）
    ctx.save();
    ctx.shadowColor='#FFD700'; ctx.shadowBlur=18;
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=3; rrect(W/2-290,100,580,260,26); ctx.stroke();
    ctx.strokeStyle='rgba(255,215,0,0.3)'; ctx.lineWidth=7; rrect(W/2-290,100,580,260,26); ctx.stroke();
    ctx.restore();

    // 「パーフェクト」ロゴ
    ctx.save();
    ctx.textAlign='center';
    const rainbow=['#FF4488','#FF8844','#FFD700','#44FF88','#4488FF','#BB44FF'];
    const txt='✨ パーフェクト！ ✨';
    fitFont(txt,560,42);
    // レインボー文字
    for(let ci=0;ci<txt.length;ci++){
      const cx=W/2-ctx.measureText(txt).width/2+ctx.measureText(txt.slice(0,ci)).width+ctx.measureText(txt[ci]).width/2;
      ctx.fillStyle=rainbow[ci%rainbow.length];
      ctx.shadowColor=rainbow[ci%rainbow.length]; ctx.shadowBlur=14;
      ctx.fillText(txt[ci],cx,158);
    }
    ctx.restore();

    // 「ノーダメージクリア！」バッジ
    ctx.save();
    ctx.textAlign='center';
    const bdg=ctx.createLinearGradient(W/2-140,168,W/2+140,198);
    bdg.addColorStop(0,'#FF6600'); bdg.addColorStop(0.5,'#FFD700'); bdg.addColorStop(1,'#FF6600');
    ctx.fillStyle=bdg; rrect(W/2-140,168,280,30,15); ctx.fill();
    ctx.strokeStyle='#FFF'; ctx.lineWidth=1.5; rrect(W/2-140,168,280,30,15); ctx.stroke();
    ctx.fillStyle='#1a0000'; ctx.font='bold 17px sans-serif';
    ctx.shadowColor='transparent';
    ctx.fillText('🛡 ノーダメージクリア達成！！',W/2,189);
    ctx.restore();

    // スコア
    ctx.save();
    ctx.textAlign='center';
    ctx.fillStyle='#FFFFFF'; ctx.shadowColor='#88FFFF'; ctx.shadowBlur=6;
    fitFont('さいしゅうスコア: '+total+' てん！！',540,26);
    ctx.fillText('さいしゅうスコア: '+total+' てん！！',W/2,228);
    ctx.restore();

    // ★★★★（ノーダメ=ボーナス4つ目の星）
    ctx.save(); ctx.textAlign='center';
    for(let i=0;i<4;i++){
      ctx.fillStyle='#FFD700'; ctx.font='36px sans-serif';
      ctx.shadowColor='#FFD700'; ctx.shadowBlur=12+(Math.sin(t*3+i)*6);
      ctx.fillText('★',W/2-93+i*62,278);
    }
    ctx.restore();

    // 4キャラ全員ジャンプ＆踊る
    const af=Math.floor(t*7)%4;
    for(let i=0;i<4;i++){
      const bounce=Math.sin(t*4+i*Math.PI/2)*18;
      drawChar(CHARS[i],152+i*128,300+bounce,af,false);
    }

    // 点滅テキスト
    if(blink(3)){
      ctx.save(); ctx.textAlign='center';
      ctx.fillStyle='#CCFFCC'; ctx.shadowColor='#44FF88'; ctx.shadowBlur=8;
      fitFont('タップ → もう1かい あそぶ',500,18);
      ctx.fillText('タップ → もう1かい あそぶ',W/2,424);
      ctx.restore();
    }

  } else {
    // ══════════════════════════════════════════
    // 通常エンディング
    // ══════════════════════════════════════════
    drawBG_shore(0);
    for(let f=0;f<7;f++){
      const fx=60+f*115, fy=55+Math.sin(t*0.8+f)*28;
      for(let i=0;i<12;i++){
        const a=i/12*Math.PI*2+t*1.5, r=34+Math.sin(t*3+f)*8;
        ctx.fillStyle=fc[(f+i)%fc.length];
        ctx.beginPath(); ctx.arc(fx+Math.cos(a)*r,fy+Math.sin(a)*r,4,0,Math.PI*2); ctx.fill();
      }
    }
    const eg=ctx.createLinearGradient(W/2-285,128,W/2+285,318);
    eg.addColorStop(0,'rgba(0,20,60,0.88)'); eg.addColorStop(1,'rgba(0,40,20,0.88)');
    ctx.fillStyle=eg; rrect(W/2-285,128,570,190,22); ctx.fill();
    ctx.strokeStyle='rgba(255,215,0,0.5)'; ctx.lineWidth=2; rrect(W/2-285,128,570,190,22); ctx.stroke();
    ctx.textAlign='center';
    ctx.fillStyle='#FFD700';
    fitFont('🎊 ぜんぶ クリア！ おめでとう！',540,38); ctx.fillText('🎊 ぜんぶ クリア！ おめでとう！',W/2,180);
    ctx.fillStyle='#FFF';
    fitFont('さいしゅうスコア: '+total+' てん！！',540,26); ctx.fillText('さいしゅうスコア: '+total+' てん！！',W/2,228);
    const stars=total>=1500?3:total>=800?2:1;
    for(let i=0;i<3;i++){ctx.fillStyle=i<stars?'#FFD700':'#555';ctx.font='36px sans-serif';ctx.fillText('★',W/2-62+i*62,280);}
    const af=Math.floor(Date.now()/140)%4;
    for(let i=0;i<4;i++) drawChar(CHARS[i],152+i*128,298,af,false);
    if(blink(3)){ctx.fillStyle='#CCFFCC';fitFont('タップ → もう1かい あそぶ',500,18);ctx.fillText('タップ → もう1かい あそぶ',W/2,422);}
    ctx.textAlign='left';
  }
}

function drawCloud(x, y, s) {
  ctx.save(); ctx.translate(x,y); ctx.scale(s,s);
  ctx.fillStyle='rgba(255,255,255,0.88)';
  [[-20,5,16],[0,-4,20],[22,4,16],[40,6,13],[-36,8,12]].forEach(([cx,cy,r])=>{
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();
}
function drawClouds(sc, alpha) {
  const positions=[{x:80,y:55,s:1.1},{x:280,y:35,s:0.85},{x:490,y:62,s:1.0},{x:680,y:42,s:0.9}];
  ctx.save(); ctx.globalAlpha=alpha||0.9;
  positions.forEach(({x,y,s})=> drawCloud(((x-sc*0.08)%(W+160))-80, y, s));
  ctx.restore();
}

// ── 背景写真描画ヘルパー ──
function drawBGPhoto(img, sc, overlayAlpha){
  if(!img || !img.complete || img.naturalWidth===0){
    // フォールバック（画像未読込）
    ctx.fillStyle='#87CEEB'; ctx.fillRect(0,0,W,H);
    return;
  }
  // 横スクロール parallax（画像1600px → canvas800px、ゆっくり動く）
  const imgW=1600, imgH=450;
  const offset=((sc*0.12)%imgW+imgW)%imgW;
  // メイン描画
  ctx.drawImage(img, -offset, 0, imgW, imgH);
  // ループのため2枚目
  if(offset>0) ctx.drawImage(img, imgW-offset, 0, imgW, imgH);
  // 半透明オーバーレイで視認性を上げる
  if(overlayAlpha>0){
    ctx.fillStyle=`rgba(0,0,0,${overlayAlpha})`;
    ctx.fillRect(0,0,W,H);
  }
}

// =============================================
// キャラクター描画 v6（どうぶつの森風・シンプルPOP）
// =============================================
function drawChar(c, x, y, af, withShadow) {
  if(!c) return;
  const leg=af?[0,6,0,-6][af]:0, arm=af?[0,7,0,-7][af]:0;

  // ── ズボン ──
  ctx.fillStyle='#445566';
  ctx.fillRect(x+9,  y+38, 11, 14+leg);
  ctx.fillRect(x+22, y+38, 11, 14-leg);

  // ── ソックス（黄緑）──
  ctx.fillStyle='#66CC44';
  ctx.fillRect(x+9,  y+49+leg, 11, 5);
  ctx.fillRect(x+22, y+49-leg, 11, 5);

  // ── 靴（水色 AC風）──
  const sGL=ctx.createLinearGradient(x+0,y+53+leg,x+0,y+64+leg);
  sGL.addColorStop(0,'#77BBFF'); sGL.addColorStop(1,'#2255BB');
  ctx.fillStyle=sGL; rrect(x+0,y+53+leg,21,11,5); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.fillRect(x+1,y+54+leg,17,4);
  const sGR=ctx.createLinearGradient(x+20,y+53-leg,x+20,y+64-leg);
  sGR.addColorStop(0,'#77BBFF'); sGR.addColorStop(1,'#2255BB');
  ctx.fillStyle=sGR; rrect(x+20,y+53-leg,21,11,5); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.fillRect(x+21,y+54-leg,17,4);

  // ── スカート（りん）──
  if(c.skirt){
    const skG=ctx.createLinearGradient(x,y+34,x,y+51);
    skG.addColorStop(0,'#FF99CC'); skG.addColorStop(1,'#DD5588');
    ctx.fillStyle=skG;
    ctx.beginPath(); ctx.moveTo(x+2,y+34);ctx.lineTo(x+0,y+51);ctx.lineTo(x+42,y+51);ctx.lineTo(x+40,y+34); ctx.fill();
    ctx.fillStyle='rgba(255,200,230,0.5)'; ctx.fillRect(x+0,y+48,42,3);
  }

  // ── 体（シャツ）──
  const bG=ctx.createLinearGradient(x+4,y+14,x+38,y+38);
  bG.addColorStop(0,shiftColor(c.color,60)); bG.addColorStop(0.5,c.color); bG.addColorStop(1,shiftColor(c.color,-45));
  ctx.fillStyle=bG; rrect(x+4,y+14,34,24,8); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.24)'; rrect(x+6,y+15,30,9,5); ctx.fill();

  // ── 腕（太め丸み）──
  const aG=ctx.createLinearGradient(x-7,y+15,x+7,y+26);
  aG.addColorStop(0,shiftColor(c.color,45)); aG.addColorStop(1,shiftColor(c.color,-15));
  ctx.fillStyle=aG;
  rrect(x-7,y+15+arm,14,11,5); ctx.fill();
  rrect(x+35,y+15-arm,14,11,5); ctx.fill();

  // ── 手（大きい丸 AC風）──
  [[x-1,y+25+arm],[x+43,y+25-arm]].forEach(([hx,hy])=>{
    const hG=ctx.createRadialGradient(hx,hy,0,hx,hy,7.5);
    hG.addColorStop(0,'#FFE8CC'); hG.addColorStop(1,'#FFCC88');
    ctx.fillStyle=hG; ctx.beginPath(); ctx.arc(hx,hy,7.5,0,Math.PI*2); ctx.fill();
  });

  // ── りん: ロングヘア後ろ（顔より先に）──
  if(c.skirt){
    ctx.fillStyle=c.hair;
    // 左サイドロング（毛先を丸く）
    ctx.beginPath();
    ctx.moveTo(x+3,y+5); ctx.lineTo(x+3,y+38);
    ctx.quadraticCurveTo(x+4,y+46,x+11,y+46);
    ctx.lineTo(x+13,y+46);
    ctx.quadraticCurveTo(x+15,y+46,x+15,y+38);
    ctx.lineTo(x+15,y+5); ctx.fill();
    // 右サイドロング
    ctx.beginPath();
    ctx.moveTo(x+27,y+5); ctx.lineTo(x+27,y+35);
    ctx.quadraticCurveTo(x+28,y+43,x+35,y+43);
    ctx.lineTo(x+37,y+43);
    ctx.quadraticCurveTo(x+38,y+43,x+38,y+35);
    ctx.lineTo(x+38,y+5); ctx.fill();
  }

  // ── 顔（大きい丸・AC風）──
  const fG=ctx.createRadialGradient(x+13,y+3,2,x+20,y+8,18);
  fG.addColorStop(0,'#FFE8BB'); fG.addColorStop(1,'#FFCC88');
  ctx.fillStyle=fG; ctx.beginPath(); ctx.arc(x+20,y+8,18,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(180,110,50,0.18)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(x+20,y+8,18,0,Math.PI*2); ctx.stroke();
  // 顔ハイライト
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.beginPath(); ctx.arc(x+11,y+2,6,0,Math.PI*2); ctx.fill();

  // ── ほっぺた（大きめ丸・AC風）──
  ctx.fillStyle='rgba(255,145,130,0.44)';
  ctx.beginPath(); ctx.arc(x+8, y+14,6.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+32,y+14,6.5,0,Math.PI*2); ctx.fill();

  // ── 目（小さめ黒丸・AC風）──
  ctx.fillStyle='#060606';
  ctx.beginPath(); ctx.ellipse(x+14,y+10,3.5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+26,y+10,3.5,4,0,0,Math.PI*2); ctx.fill();
  // メインハイライト
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.beginPath(); ctx.arc(x+15.5,y+7.5,1.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+27.5,y+7.5,1.8,0,Math.PI*2); ctx.fill();
  // サブハイライト（小）
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.beginPath(); ctx.arc(x+12.5,y+11.5,0.9,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+24.5,y+11.5,0.9,0,Math.PI*2); ctx.fill();

  // ── 鼻（小さいオレンジ丸ボタン・AC風）──
  ctx.fillStyle='#FF9944';
  ctx.beginPath(); ctx.ellipse(x+20,y+17,3.5,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,220,160,0.55)';
  ctx.beginPath(); ctx.arc(x+18.5,y+15.5,1.8,0,Math.PI*2); ctx.fill();

  // ── 笑顔 ──
  ctx.save();
  ctx.strokeStyle='rgba(140,70,40,0.72)'; ctx.lineWidth=2.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(x+20,y+22,4,0.12*Math.PI,0.88*Math.PI); ctx.stroke();
  ctx.restore();

  // ── 髪（顔円にclipオーバーレイ方式）──
  // 顔と同じ円を髪色で塗るが、上部だけをclipして表示 → 頭頂〜前髪が一体のシルエットになる
  ctx.save();
  ctx.beginPath();
  if(!c.skirt){
    // 男の子：ギザギザ前髪をclipパスの下縁にする
    ctx.moveTo(x+2,  y+7);
    ctx.lineTo(x+7,  y+1);
    ctx.lineTo(x+12, y+6);
    ctx.lineTo(x+17, y+1);
    ctx.lineTo(x+20, y+6);
    ctx.lineTo(x+23, y+1);
    ctx.lineTo(x+28, y+6);
    ctx.lineTo(x+33, y+1);
    ctx.lineTo(x+38, y+7);
    ctx.lineTo(x+38, y-35);
    ctx.lineTo(x+2,  y-35);
    ctx.closePath();
  } else {
    // 女の子：ぱっつん前髪 = clip矩形の下端が直線になる（y+5まで）
    ctx.rect(x, y-35, 42, 40); // y-35 〜 y+5
  }
  ctx.clip();
  // 顔と同じ大きさの円を髪色で塗る
  ctx.beginPath();
  ctx.arc(x+20, y+8, 19, 0, Math.PI*2);
  ctx.fillStyle = c.hair;
  ctx.fill();
  // ハイライト
  ctx.fillStyle='rgba(255,255,255,0.22)';
  ctx.beginPath(); ctx.arc(x+13,y-7,7,Math.PI,0); ctx.fill();
  ctx.restore();
}

}

      const ft=Date.now()*0.01;
      [[0,'#FF5500'],[7,'#FF8800'],[13,'#FFCC00']].forEach(([dx,col],fi)=>{
        const fw=Math.sin(ft+fi*1.3)*3;
        const fg=ctx.createLinearGradient(ox+12+dx,oy+32,ox+12+dx,oy+4);

        ctx.quadraticCurveTo(ox+22+dx+fw,oy+18,ox+18+dx,oy+32); ctx.fill();
      });
      break;
    }

    case 'log': {
      const lg=ctx.createLinearGradient(ox,oy,ox+o.w,oy+o.h);
      lg.addColorStop(0,'#AA5520'); lg.addColorStop(1,'#5A2A08');
      ctx.fillStyle=lg; ctx.fillRect(ox,oy,o.w,o.h);
      ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fillRect(ox+2,oy+2,o.w-4,8);
      ctx.fillStyle='rgba(0,0,0,0.25)'; for(let r2=1;r2<4;r2++) ctx.fillRect(ox+1,oy+r2*12,o.w-2,2);
      break;
    }

    case 'jumpfish': {
      const fg=ctx.createRadialGradient(ox+14,oy+15,2,ox+14,oy+25,20);
      fg.addColorStop(0,'#FF9944'); fg.addColorStop(1,'#CC4400');
      ctx.fillStyle=fg; ctx.beginPath(); ctx.ellipse(ox+14,oy+25,12,20,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#FFCC66'; ctx.beginPath(); ctx.moveTo(ox+14,oy+2);ctx.lineTo(ox+4,oy+18);ctx.lineTo(ox+24,oy+18); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.ellipse(ox+10,oy+14,3,5,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(ox+10,oy+22,2,0,Math.PI*2); ctx.fill();
      break;
    }

    case 'duck': {
      const dg=ctx.createLinearGradient(ox,oy+8,ox,oy+32);
      dg.addColorStop(0,'#BED0FF'); dg.addColorStop(1,'#7A99EE');
      ctx.fillStyle=dg; ctx.beginPath(); ctx.ellipse(ox+22,oy+18,20,13,0,0,Math.PI*2); ctx.fill();
      const hg=ctx.createRadialGradient(ox+32,oy+6,2,ox+35,oy+8,11);
      hg.addColorStop(0,'#AACCFF'); hg.addColorStop(1,'#6688DD');
      ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(ox+35,oy+8,11,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#FF9900'; ctx.beginPath(); ctx.moveTo(ox+44,oy+8);ctx.lineTo(ox+52,oy+6);ctx.lineTo(ox+44,oy+13); ctx.fill();
      ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(ox+38,oy+6,2,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(ox+39,oy+5,0.8,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,100,0.95)'; ctx.font='14px sans-serif'; ctx.textAlign='center';
      ctx.fillText('↑',ox+22,oy-5); ctx.textAlign='left';
      break;
    }

    case 'branch': {
      const brg=ctx.createLinearGradient(ox,oy,ox,oy+o.h);
      brg.addColorStop(0,'#AA8830'); brg.addColorStop(1,'#664400');
      ctx.fillStyle=brg; ctx.fillRect(ox,oy,o.w,o.h);

      ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(ox+15,oy,6,o.h);
      break;
    }

    case 'rollog': {
      const ang=(frame*0.09)%(Math.PI*2);
      ctx.save(); ctx.translate(ox+16,oy+16); ctx.rotate(ang);
      ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=6; ctx.shadowOffsetX=3; ctx.shadowOffsetY=3;
      const rlg=ctx.createRadialGradient(-4,-4,2,0,0,16);
      rlg.addColorStop(0,'#FFAA44'); rlg.addColorStop(0.5,'#DD6611'); rlg.addColorStop(1,'#882200');
      ctx.fillStyle=rlg; ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0; ctx.shadowOffsetX=0; ctx.shadowOffsetY=0;
      [10,6,3].forEach((r,i)=>{ ctx.strokeStyle=`rgba(255,200,100,${0.5-i*0.12})`; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.stroke(); });
      ctx.strokeStyle='rgba(255,180,80,0.6)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(14,0); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-14); ctx.lineTo(0,14); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.ellipse(-4,-4,5,3,0.5,0,Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle='rgba(255,140,0,0.9)'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
      ctx.fillText('ゴロゴロ！',ox+16,oy-6); ctx.textAlign='left';
      break;
    }

    case 'pine': {
      const p1g=ctx.createLinearGradient(ox,oy+o.h,ox,oy);
      p1g.addColorStop(0,'#116622'); p1g.addColorStop(1,'#33EE55');
      ctx.fillStyle=p1g;
      ctx.beginPath(); ctx.moveTo(ox,oy+o.h); ctx.lineTo(ox+o.w/2,oy); ctx.lineTo(ox+o.w,oy+o.h); ctx.fill();
      ctx.fillStyle='rgba(150,255,100,0.35)';
      ctx.beginPath(); ctx.moveTo(ox+4,oy+o.h-4); ctx.lineTo(ox+o.w/2,oy+6); ctx.lineTo(ox+o.w-4,oy+o.h-4); ctx.fill();
      ctx.strokeStyle='#008820'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(ox,oy+o.h); ctx.lineTo(ox+o.w/2,oy); ctx.lineTo(ox+o.w,oy+o.h); ctx.closePath(); ctx.stroke();
      ctx.fillStyle='#FF4400'; ctx.fillRect(ox+4,oy+o.h-6,o.w-8,6);
      ctx.fillStyle='#FFDD00';
      ctx.fillRect(ox+6,oy+o.h-6,5,6); ctx.fillRect(ox+16,oy+o.h-6,5,6);
      ctx.fillStyle='rgba(255,255,100,0.9)'; ctx.font='13px sans-serif'; ctx.textAlign='center';
      ctx.fillText('↑',ox+o.w/2,oy-6); ctx.textAlign='left';
      break;
    }

    // ── ステージ3 大岩（bouler）─旧smokeに代わる新障害物─
    case 'boulder': {
      const bw=o.w, bh=o.h;
      const bcx=ox+bw/2, bcy=oy+bh/2;

      // 地面影
      ctx.save(); ctx.globalAlpha=0.28; ctx.fillStyle='#000';
      ctx.beginPath(); ctx.ellipse(bcx, oy+bh+3, bw*0.48, 5, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();

      // 岩本体（不規則なシルエット＋ラジアルグラデーション）
      const brg=ctx.createRadialGradient(
        bcx-bw*0.22, bcy-bh*0.24, 2,
        bcx, bcy, Math.max(bw,bh)*0.7
      );
      brg.addColorStop(0,'#BBBBBB');
      brg.addColorStop(0.3,'#888888');
      brg.addColorStop(0.65,'#484848');
      brg.addColorStop(1,'#161616');
      ctx.fillStyle=brg;
      ctx.beginPath();
      ctx.moveTo(ox+13,         oy+bh);
      ctx.quadraticCurveTo(ox+2,      oy+bh*0.78, ox+3,      oy+bh*0.38);
      ctx.quadraticCurveTo(ox+5,      oy+5,        ox+bw*0.27,oy+1);
      ctx.quadraticCurveTo(ox+bw*0.5, oy-3,        ox+bw*0.7, oy+1);
      ctx.quadraticCurveTo(ox+bw-4,   oy+7,        ox+bw-2,   oy+bh*0.42);
      ctx.quadraticCurveTo(ox+bw+1,   oy+bh*0.78,  ox+bw-11,  oy+bh);
      ctx.closePath(); ctx.fill();

      // 表面ハイライト（光沢）
      ctx.fillStyle='rgba(255,255,255,0.14)';
      ctx.beginPath();
      ctx.ellipse(bcx-bw*0.18, bcy-bh*0.22, bw*0.22, bh*0.16, -0.3, 0, Math.PI*2); ctx.fill();

      // ひびワレ（3本）
      ctx.save();
      ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=1.6; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(bcx-4,bcy-9); ctx.lineTo(bcx+12,bcy+9); ctx.lineTo(bcx+8,bcy+19); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bcx-4,bcy-9); ctx.lineTo(bcx-15,bcy+5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bcx+5,bcy-3); ctx.lineTo(bcx-2,bcy-15); ctx.stroke();
      // ひびの明るい側
      ctx.strokeStyle='rgba(200,200,200,0.18)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(bcx-3,bcy-8); ctx.lineTo(bcx+13,bcy+10); ctx.stroke();
      ctx.restore();

      // 苔（緑）
      ctx.save(); ctx.globalAlpha=0.6;
      ctx.fillStyle='#3A9E28';
      ctx.beginPath(); ctx.ellipse(ox+11,  oy+bh-8, 9, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(ox+bw-12,oy+bh-9, 7, 4, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(ox+bw*0.45,oy+bh*0.28, 5, 3, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // 警告ラベル
      ctx.fillStyle='rgba(255,210,60,0.92)'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText('⚠ 大岩！',bcx,oy-5); ctx.textAlign='left';
      break;
    }
  }
}

      cnG.addColorStop(0,'#FFEE44'); cnG.addColorStop(1,'#DDAA00');
      ctx.fillStyle=cnG; ctx.beginPath(); ctx.ellipse(0,0,8,14,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,200,0.4)'; ctx.beginPath(); ctx.ellipse(-2,-4,3,8,0,0,Math.PI*2); ctx.fill();

      ctx.fillStyle='#44CC44'; ctx.fillRect(-3,-16,6,8); break;

      ctx.fillStyle='#FFD700'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center';
      ctx.fillText('★',0,-20); ctx.textAlign='left'; break;

  ctx.strokeStyle=`rgba(255,255,255,${g*0.4})`; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(0,0,22,0,Math.PI*2); ctx.stroke();
  ctx.restore();
}

function drawGoal(ox, oy){
  const pg=ctx.createLinearGradient(ox+27,0,ox+33,0);

  ctx.fillStyle=flg; ctx.beginPath(); ctx.moveTo(ox+33,oy-40);ctx.lineTo(ox+80+wv,oy-22);ctx.lineTo(ox+33,oy-4); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.25)'; ctx.beginPath(); ctx.moveTo(ox+33,oy-40);ctx.lineTo(ox+65+wv,oy-35);ctx.lineTo(ox+33,oy-26); ctx.fill();

  ctx.fillStyle='#FFF'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  ctx.fillText('ゴール！',ox+55,oy-56); ctx.textAlign='left';

  const tblG=ctx.createLinearGradient(ox-38,oy+70,ox+94,oy+120);
  tblG.addColorStop(0,'#AA6622'); tblG.addColorStop(1,'#552200');
  ctx.fillStyle=tblG;
  ctx.fillRect(ox-38,oy+70,132,12); ctx.fillRect(ox-28,oy+82,12,32); ctx.fillRect(ox+76,oy+82,12,32);

  const mG=ctx.createLinearGradient(ox-18,oy+58,ox+20,oy+72);
  mG.addColorStop(0,'#FF7744'); mG.addColorStop(1,'#CC2200');
  ctx.fillStyle=mG; ctx.fillRect(ox-18,oy+58,38,14);
  ctx.fillStyle='#FFCC33'; ctx.fillRect(ox+26,oy+60,26,12);
  ctx.fillStyle='#66EE44'; ctx.fillRect(ox+58,oy+60,24,12);
  ctx.save(); ctx.shadowColor='#FF6600'; ctx.shadowBlur=8;
  ctx.fillStyle='#FF4400';
  for(let ci=0;ci<5;ci++){ctx.beginPath();ctx.arc(ox-14+ci*12,oy+52,4,0,Math.PI*2);ctx.fill();}
  ctx.restore();
}

// =============================================
// 富士山・木
// =============================================
function drawFuji(x,y,w,h){
  const mg=ctx.createLinearGradient(x+w/2,y,x,y+h);
  mg.addColorStop(0,'#CCCCDD'); mg.addColorStop(1,'#9999AA');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.moveTo(x,y+h);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w,y+h); ctx.fill();
  const sg=ctx.createLinearGradient(x+w/2,y,x+w/2,y+70);
  sg.addColorStop(0,'#FFFFFF'); sg.addColorStop(1,'rgba(240,240,255,0.5)');
  ctx.fillStyle=sg; ctx.beginPath(); ctx.moveTo(x+w/2-55,y+68);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w/2+55,y+68); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.moveTo(x+w/2-20,y+30);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w/2+5,y+30); ctx.fill();
}

function drawTree(x,y,w,h){
  const tg=ctx.createLinearGradient(x+w/2-4,y+h-18,x+w/2+4,y+h+2);
  tg.addColorStop(0,'#8B5A10'); tg.addColorStop(1,'#4A2A05');
  ctx.fillStyle=tg; ctx.fillRect(x+w/2-4,y+h-18,8,20);
  const lg=ctx.createLinearGradient(x,y+h,x+w/2,y);
  lg.addColorStop(0,'#228822'); lg.addColorStop(1,'#66CC44');
  ctx.fillStyle=lg; ctx.beginPath(); ctx.moveTo(x,y+h);ctx.lineTo(x+w/2,y);ctx.lineTo(x+w,y+h); ctx.fill();
  ctx.fillStyle='rgba(150,255,80,0.25)'; ctx.beginPath(); ctx.moveTo(x+6,y+h-10);ctx.lineTo(x+w/2,y+12);ctx.lineTo(x+w-6,y+h-10); ctx.fill();
}

// =============================================
// ユーティリティ
// =============================================
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}
function rand(n){return Math.random()*n;}
function ri(n){return Math.floor(Math.random()*n);}
function blink(f){return Math.sin(Date.now()*0.001*f)>0;}
function spawnPtcl(x,y,col,n,spd){
  for(let i=0;i<n;i++){
    const a=rand(Math.PI*2);
    ptcls.push({x,y,vx:Math.cos(a)*spd*rand(1.5),vy:Math.sin(a)*spd*rand(1.5)-1,life:28,col,r:5});
  }
}
function addTxt(x,y,txt,col){ftexts.push({x,y,txt,col,life:50});}

// =============================================
// メインループ
// =============================================
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
